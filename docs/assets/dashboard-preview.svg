<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Job Finder dashboard preview</title>
  <desc id="desc">Illustrated preview of the Job Finder dashboard showing saved searches, ranked jobs, and an applied list.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f7f2e5" />
